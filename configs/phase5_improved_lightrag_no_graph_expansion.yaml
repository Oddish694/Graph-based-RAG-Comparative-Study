seed: 42
dataset_name: hotpotqa/hotpot_qa
dataset_config: distractor
split: validation
sample_size: 100
dataset_path: data/processed/hotpotqa_small.jsonl
output_dir: results/phase5_improved_lightrag_no_graph_expansion

chunking:
  strategy: fixed
  chunk_size: 64
  overlap: 8

embedding:
  type: sentence_transformers
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cpu

retrieval:
  method: improved_lightrag
  top_k: 10
  candidate_k: 40
  candidate_pool_size: 40
  seed_top_k: 10
  bm25_weight: 0.5
  dense_weight: 0.5
  fusion: weighted
  coverage_weight: 0.05
  entity_coverage_weight: 0.03
  relevance_weight: 1.0
  use_graph_expansion: false
  use_coverage_reranking: true

metrics:
  k_values: [1, 3, 5, 10]
