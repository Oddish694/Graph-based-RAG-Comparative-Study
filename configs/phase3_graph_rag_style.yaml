seed: 42
dataset_name: hotpotqa/hotpot_qa
dataset_config: distractor
split: validation
sample_size: 100
dataset_path: data/processed/hotpotqa_small.jsonl
output_dir: results/phase3_graph_rag_style

chunking:
  strategy: fixed
  chunk_size: 64
  overlap: 8

embedding:
  type: sentence_transformers
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cpu

retrieval:
  method: graph_rag_style
  top_k: 10
  candidate_k: 40
  seed_top_k: 10
  expansion_depth: 1
  max_neighbors_per_entity: 10
  max_seed_entities: 25
  seed_weight: 0.7
  graph_weight: 0.3
  query_entity_weight: 0.45
  seed_entity_weight: 0.25
  expansion_weight: 0.30
  distance_decay: 0.5
  bm25_weight: 0.5
  dense_weight: 0.5
  fusion: weighted

metrics:
  k_values: [1, 3, 5, 10]
