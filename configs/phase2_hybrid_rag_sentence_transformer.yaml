seed: 42
dataset_name: hotpotqa/hotpot_qa
dataset_config: distractor
split: validation
sample_size: 100
dataset_path: data/processed/hotpotqa_small.jsonl
output_dir: results/phase2_hybrid_rag_sentence_transformer

chunking:
  strategy: fixed
  chunk_size: 64
  overlap: 8

embedding:
  type: sentence_transformers
  model_name: sentence-transformers/all-MiniLM-L6-v2

retrieval:
  method: hybrid
  top_k: 5
  candidate_k: 20
  bm25_weight: 0.5
  dense_weight: 0.5
  fusion: weighted

metrics:
  k_values: [1, 3, 5]
